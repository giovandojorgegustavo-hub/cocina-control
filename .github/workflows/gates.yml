name: Gates de la Fabrica

on:
  pull_request:

jobs:
  estructura:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar golden path
        run: |
          for d in src tests migrations docs; do
            test -d "$d" || { echo "FALTA la carpeta $d"; exit 1; }
          done
          test -f CLAUDE.md || { echo "FALTA CLAUDE.md"; exit 1; }
          echo "Estructura OK - gate aprobado"

  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cocina
          POSTGRES_PASSWORD: cocina
          POSTGRES_DB: cocina_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://cocina:cocina@localhost:5432/cocina_test
          COCINA_JWT_SECRET: test-secret-ci-only-minimum-32-chars-abcdef
        run: uv run pytest -v

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            frontend-${{ runner.os }}-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
