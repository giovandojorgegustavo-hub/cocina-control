name: Gates de la Fabrica

on:
  pull_request:

jobs:
  estructura:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar golden path
        run: |
          for d in src tests migrations docs; do
            test -d "$d" || { echo "FALTA la carpeta $d"; exit 1; }
          done
          test -f CLAUDE.md || { echo "FALTA CLAUDE.md"; exit 1; }
          echo "Estructura OK - gate aprobado"

  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cocina
          POSTGRES_PASSWORD: cocina
          POSTGRES_DB: cocina_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://cocina:cocina@localhost:5432/cocina_test
        run: uv run pytest -v
